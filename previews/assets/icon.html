<!doctype html><html><head><meta charset="utf-8">
<style>
  *{margin:0;box-sizing:border-box}
  html,body{width:180px;height:180px}
  .tile{width:180px;height:180px;background:#122036;
    display:flex;flex-direction:column;align-items:center;justify-content:center}
  /* WJ monogram — system serif, J lifted + slightly scaled so it sits flush on the
     W baseline (no hanging descender, no poking above the cap). */
  .wj{font-family:Georgia,'Times New Roman','Liberation Serif',serif;font-weight:700;
    color:#F7F4EC;font-size:90px;line-height:1;letter-spacing:.015em}
  .wj .j{display:inline-block;font-size:0.92em;transform:translateY(-0.10em)}
  .rule{width:74px;height:3px;background:#c8a24b;margin-top:20px}
</style></head>
<body><div class="tile"><div class="wj">W<span class="j">J</span></div><div class="rule"></div></div></body></html>
