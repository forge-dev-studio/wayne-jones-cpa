<!doctype html><html><head><meta charset="utf-8">
<style>
  *{margin:0;box-sizing:border-box}
  html,body{width:600px;height:750px;overflow:hidden;background:#122036}
  .stage{width:600px;height:750px;position:relative;overflow:hidden}
  .photo{
    position:absolute;inset:0;width:100%;height:100%;
    background-image:url('file:///home/adminsynergycloud/wayne-jones-cpa/research/wayne-photo-original.jpg');
    background-size:cover;background-position:center 6%;background-repeat:no-repeat;
  }
  .grade{position:absolute;inset:0;pointer-events:none}

  /* ── NATURAL: true-to-life, gently graded; CSS on the live site adds grayscale(.12) contrast(1.02) on top ── */
  body.natural .photo{filter:contrast(1.05) saturate(0.9) brightness(1.015);}
  body.natural .grade{
    background:
      radial-gradient(125% 95% at 50% 30%, transparent 52%, rgba(18,32,54,0.16) 100%),
      linear-gradient(180deg, rgba(247,244,236,0.04) 0%, transparent 22%);
  }

  /* ── DUOTONE: sepia-navy editorial map, fuses with the engraved aesthetic ── */
  body.duotone .photo{filter:url(#duo) contrast(1.02) brightness(1.0);}
  body.duotone .grade{
    background:radial-gradient(125% 100% at 50% 28%, transparent 46%, rgba(9,17,30,0.40) 100%);
  }
</style></head>
<body class="natural">
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <filter id="duo" color-interpolation-filters="sRGB">
      <feColorMatrix type="matrix"
        values="0.2126 0.7152 0.0722 0 0
                0.2126 0.7152 0.0722 0 0
                0.2126 0.7152 0.0722 0 0
                0 0 0 1 0"/>
      <feComponentTransfer>
        <feFuncR type="table" tableValues="0.043 0.45 0.957"/>
        <feFuncG type="table" tableValues="0.078 0.40 0.937"/>
        <feFuncB type="table" tableValues="0.141 0.34 0.886"/>
      </feComponentTransfer>
    </filter>
  </svg>
  <div class="stage"><div class="photo"></div><div class="grade"></div></div>
</body></html>
