<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Spectral:wght@400;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;box-sizing:border-box}
  html,body{width:1200px;height:630px}
  .card{width:1200px;height:630px;background:#122036;position:relative;overflow:hidden;
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-family:'Spectral',serif}
  .card::before{content:"";position:absolute;inset:28px;border:1px solid rgba(182,146,74,.5)}
  .card::after{content:"";position:absolute;inset:34px;border:1px solid rgba(182,146,74,.22)}
  .eyebrow{font:600 20px 'Spectral';letter-spacing:.34em;text-transform:uppercase;color:#c8a24b;margin-bottom:22px}
  h1{font:600 92px 'Fraunces',serif;color:#F7F4EC;line-height:1;letter-spacing:-.01em}
  h1 em{font-style:italic;color:#c8a24b}
  .rule{width:120px;height:1px;background:#c8a24b;margin:30px 0 24px}
  .sub{font:400 27px 'Spectral';color:rgba(247,244,243,.84);letter-spacing:.02em}
  .seal{position:absolute;bottom:54px;right:64px;width:96px;height:96px;border:1.5px solid #c8a24b;border-radius:50%;
    display:flex;align-items:center;justify-content:center;color:#c8a24b;font:600 34px 'Fraunces'}
  .seal::before{content:"";position:absolute;inset:7px;border:1px solid rgba(200,162,75,.5);border-radius:50%}
  .est{position:absolute;bottom:60px;left:64px;font:600 18px 'Spectral';letter-spacing:.22em;color:rgba(200,162,75,.85);text-transform:uppercase}
</style></head>
<body><div class="card">
  <div class="eyebrow">Certified Public Accountant</div>
  <h1>Wayne Jones, <em>CPA</em></h1>
  <div class="rule"></div>
  <div class="sub">Tax &amp; Accounting · Rome, Georgia · Since 2008</div>
  <div class="est">Est. 2008</div>
  <div class="seal">WJ</div>
</div></body></html>
