<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Spectral:wght@500&display=swap" rel="stylesheet">
<style>
  *{margin:0;box-sizing:border-box}
  html,body{width:600px;height:750px}
  .frame{width:600px;height:750px;background:#122036;position:relative;overflow:hidden;
    display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Spectral',serif}
  /* certificate registration frame */
  .frame::before{content:"";position:absolute;inset:22px;border:1px solid rgba(182,146,74,.55)}
  .frame::after{content:"";position:absolute;inset:28px;border:1px solid rgba(182,146,74,.25)}
  .corner{position:absolute;width:18px;height:18px;border:1.5px solid #c8a24b}
  .c1{top:14px;left:14px;border-right:0;border-bottom:0}
  .c2{top:14px;right:14px;border-left:0;border-bottom:0}
  .c3{bottom:14px;left:14px;border-right:0;border-top:0}
  .c4{bottom:14px;right:14px;border-left:0;border-top:0}
  /* silhouette */
  .silo{width:230px;height:230px;border-radius:50%;border:2px solid rgba(200,162,75,.55);
    display:flex;align-items:flex-end;justify-content:center;overflow:hidden;background:rgba(247,244,243,.04);margin-bottom:34px}
  .silo svg{width:150px;height:150px;fill:rgba(200,162,75,.55)}
  .name{font:600 30px 'Fraunces',serif;color:#F7F4EC;letter-spacing:.01em}
  .cred{font:500 14px 'Spectral';letter-spacing:.26em;text-transform:uppercase;color:#c8a24b;margin-top:10px}
  .ph{position:absolute;bottom:42px;font:500 12px 'Spectral';letter-spacing:.2em;text-transform:uppercase;color:rgba(247,244,243,.42)}
</style></head>
<body><div class="frame">
  <span class="corner c1"></span><span class="corner c2"></span><span class="corner c3"></span><span class="corner c4"></span>
  <div class="silo"><svg viewBox="0 0 24 24"><path d="M12 12.5a4.25 4.25 0 1 0 0-8.5 4.25 4.25 0 0 0 0 8.5Zm0 1.6c-3.7 0-8 1.9-8 5.2V21h16v-1.7c0-3.3-4.3-5.2-8-5.2Z"/></svg></div>
  <div class="name">Wayne Jones</div>
  <div class="cred">Certified Public Accountant</div>
  <div class="ph">Portrait — photo to come</div>
</div></body></html>
